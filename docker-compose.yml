version: '3.8'

services:
  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./web:/var/www/html
      - ./web/uploads:/var/www/html/uploads
      - ./web/images:/var/www/html/images
    environment:
      - DB_HOST=db
      - DB_NAME=teh
      - DB_USER=mizuki
      - DB_PASSWORD=5283mizuki
      - SERVER_NAME=АПТ на Docker

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: teh
      MYSQL_USER: mizuki
      MYSQL_PASSWORD: 5283mizuki
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=mizuki
      - PMA_PASSWORD=5283mizuki
      - PMA_ARBITRARY=1
      - UPLOAD_LIMIT=100M
    depends_on:
      - db

volumes:
  db_data:
